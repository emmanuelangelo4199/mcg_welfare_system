<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col">
<!-- Task-Focused Header (Suppressed Main Shell) -->
<header class="bg-surface-container-lowest border-b border-border h-header-height flex items-center px-lg sticky top-0 z-40">
<div class="max-w-4xl mx-auto w-full flex items-center gap-md">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low text-on-surface transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-on-surface">Edit Member Details</h1>
</div>
</header>
<main class="flex-1 w-full max-w-4xl mx-auto px-lg py-xl">
<!-- Warning Banner -->
<div class="bg-secondary-container text-on-secondary-container p-md rounded-lg mb-lg flex items-start gap-md shadow-sm border border-secondary-fixed-dim/20">
<span class="material-symbols-outlined mt-0.5" style="font-variation-settings: 'FILL' 1;">info</span>
<div>
<p class="font-label-md text-label-md font-bold mb-xs">You are editing Emmanuel Osei's record.</p>
<p class="font-body-md text-body-md text-on-secondary-container/80">All changes made to this profile are logged for administrative review and audit purposes.</p>
</div>
</div>
<!-- Edit Form -->
<form class="space-y-xl">
<!-- Section: Personal Information -->
<section class="bg-card rounded-xl p-lg shadow-[0_1px_3px_rgba(0,0,0,0.06)] border border-border/50">
<h2 class="font-headline-md text-headline-md text-primary mb-md border-b border-border/50 pb-sm">Personal Information</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="firstName">First Name</label>
<input class="border border-border rounded-DEFAULT px-md py-sm bg-surface-container-lowest font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-shadow" id="firstName" type="text" value="Emmanuel">
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="lastName">Last Name</label>
<input class="border border-border rounded-DEFAULT px-md py-sm bg-surface-container-lowest font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-shadow" id="lastName" type="text" value="Osei">
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="dob">Date of Birth</label>
<input class="border border-border rounded-DEFAULT px-md py-sm bg-surface-container-lowest font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-shadow" id="dob" type="date" value="1985-08-14">
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="gender">Gender</label>
<select class="border border-border rounded-DEFAULT px-md py-sm bg-surface-container-lowest font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-shadow" id="gender">
<option selected="" value="male">Male</option>
<option value="female">Female</option>
</select>
</div>
</div>
</section>
<!-- Section: Church Details -->
<section class="bg-card rounded-xl p-lg shadow-[0_1px_3px_rgba(0,0,0,0.06)] border border-border/50">
<h2 class="font-headline-md text-headline-md text-primary mb-md border-b border-border/50 pb-sm">Church Details</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="society">Society</label>
<select class="border border-border rounded-DEFAULT px-md py-sm bg-surface-container-lowest font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-shadow" id="society">
<option value="wesley">Wesley Cathedral</option>
<option selected="" value="calvary">Calvary Methodist</option>
<option value="trinity">Trinity Society</option>
</select>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="className">Class</label>
<select class="border border-border rounded-DEFAULT px-md py-sm bg-surface-container-lowest font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-shadow" id="className">
<option value="c1">Class 1 (St. John)</option>
<option selected="" value="c2">Class 2 (St. Peter)</option>
</select>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="baptismStatus">Baptism Status</label>
<select class="border border-border rounded-DEFAULT px-md py-sm bg-surface-container-lowest font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-shadow" id="baptismStatus">
<option selected="" value="baptized">Baptized</option>
<option value="not_baptized">Not Baptized</option>
</select>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="membershipType">Membership Type</label>
<select class="border border-border rounded-DEFAULT px-md py-sm bg-surface-container-lowest font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-shadow" id="membershipType">
<option selected="" value="full">Full Member</option>
<option value="adherent">Adherent</option>
<option value="junior">Junior Member</option>
</select>
</div>
</div>
</section>
<!-- Section: Contact Information -->
<section class="bg-card rounded-xl p-lg shadow-[0_1px_3px_rgba(0,0,0,0.06)] border border-border/50">
<h2 class="font-headline-md text-headline-md text-primary mb-md border-b border-border/50 pb-sm">Contact Information</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="phone">Phone Number</label>
<input class="border border-border rounded-DEFAULT px-md py-sm bg-surface-container-lowest font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-shadow" id="phone" type="tel" value="024 123 4567">
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="email">Email Address</label>
<input class="border border-border rounded-DEFAULT px-md py-sm bg-surface-container-lowest font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-shadow" id="email" type="email" value="e.osei@example.com">
</div>
<div class="flex flex-col gap-xs md:col-span-2">
<label class="font-label-md text-label-md text-on-surface-variant" for="address">Residential Address</label>
<input class="border border-border rounded-DEFAULT px-md py-sm bg-surface-container-lowest font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-shadow" id="address" type="text" value="Block B, Kumasi Central">
</div>
</div>
</section>
<!-- Form Actions -->
<div class="flex flex-col-reverse sm:flex-row items-center justify-end gap-md pt-lg border-t border-border">
<button class="w-full sm:w-auto px-lg py-sm font-label-md text-label-md text-primary hover:bg-primary-muted rounded-DEFAULT transition-colors" type="button">
                    Discard changes
                </button>
<button class="w-full sm:w-auto px-lg py-sm font-label-md text-label-md bg-primary text-on-primary hover:bg-primary-light rounded-DEFAULT shadow-sm transition-colors flex items-center justify-center gap-xs" type="submit">
<span class="material-symbols-outlined text-[18px]">save</span>
                    Save changes
                </button>
</div>
</form>
</main>
</body></html>
